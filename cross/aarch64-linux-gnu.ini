# Meson cross-compilation file for AArch64 (ARM64) Linux.
#
# Usage:
#   meson setup build_arm64 --cross-file cross/aarch64-linux-gnu.ini
#   meson compile -C build_arm64
#
# Prerequisites (Debian/Ubuntu):
#   apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static
#
# Prerequisites (Arch Linux):
#   pacman -S aarch64-linux-gnu-gcc qemu-user-static
#
# To run tests under QEMU user-mode emulation:
#   meson test -C build_arm64 --wrapper qemu-aarch64-static

[binaries]
c       = 'aarch64-linux-gnu-gcc'
cpp     = 'aarch64-linux-gnu-g++'
ar      = 'aarch64-linux-gnu-ar'
strip   = 'aarch64-linux-gnu-strip'
pkgconfig = 'aarch64-linux-gnu-pkg-config'
exe_wrapper = 'qemu-aarch64-static'

[built-in options]
c_args      = ['-march=armv8-a+crc+crypto']
c_link_args = ['-static']

[host_machine]
system     = 'linux'
cpu_family = 'aarch64'
cpu        = 'aarch64'
endian     = 'little'
