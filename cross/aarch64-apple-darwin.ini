# Meson cross-compilation file for Apple Silicon (ARM64 macOS).
#
# Usage (from a Linux or Intel Mac host with osxcross installed):
#   meson setup build_apple --cross-file cross/aarch64-apple-darwin.ini
#   meson compile -C build_apple
#
# Prerequisites:
#   osxcross toolchain with macOS 14+ SDK
#   https://github.com/tpoechtrager/osxcross

[binaries]
c       = 'oa64-clang'
cpp     = 'oa64-clang++'
ar      = 'aarch64-apple-darwin-ar'
strip   = 'aarch64-apple-darwin-strip'
pkgconfig = 'aarch64-apple-darwin-pkg-config'

[built-in options]
c_args      = ['-arch', 'arm64']
c_link_args = ['-arch', 'arm64']

[host_machine]
system     = 'darwin'
cpu_family = 'aarch64'
cpu        = 'aarch64'
endian     = 'little'
