<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eggdrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:oklch(14% 0.012 260);
  --surface:oklch(18% 0.012 260);
  --surface2:oklch(22% 0.014 260);
  --surface3:oklch(26% 0.012 260);
  --border:oklch(28% 0.01 260);
  --border-subtle:oklch(24% 0.008 260);
  --text:oklch(92% 0.005 260);
  --text-dim:oklch(62% 0.008 260);
  --text-muted:oklch(48% 0.006 260);
  --accent:oklch(75% 0.16 185);
  --accent-dim:oklch(75% 0.16 185 / 0.12);
  --accent-strong:oklch(80% 0.18 185);
  --green:oklch(72% 0.17 155);
  --green-dim:oklch(72% 0.17 155 / 0.12);
  --yellow:oklch(82% 0.15 85);
  --yellow-dim:oklch(82% 0.15 85 / 0.12);
  --red:oklch(68% 0.19 25);
  --red-dim:oklch(68% 0.19 25 / 0.12);
  --blue:oklch(72% 0.14 245);
  --blue-dim:oklch(72% 0.14 245 / 0.12);
  --purple:oklch(70% 0.15 310);
  --purple-dim:oklch(70% 0.15 310 / 0.12);
  --radius:8px;
  --radius-sm:5px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --shadow:0 2px 8px oklch(0% 0 0 / 0.3);
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--sans);outline:none}

/* Shell Layout */
.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:48px 1fr;height:100vh}
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:10}
.header .brand{font-size:13px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.header .brand span{color:var(--accent);margin-left:1px}
.header .live-status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim);font-weight:500}
.header .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2.5s infinite ease-in-out}
.header .dot.disconnected{background:var(--red);box-shadow:0 0 5px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:10px 0;display:flex;flex-direction:column;overflow-y:auto}
.sidebar .nav-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:16px 16px 4px}
.sidebar a{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:12px;font-weight:500;color:var(--text-dim);transition:all 0.12s ease;border-left:2px solid transparent}
.sidebar a:hover{background:var(--surface2);color:var(--text)}
.sidebar a.active{color:var(--accent);background:var(--accent-dim);border-left-color:var(--accent)}
.sidebar a svg{width:14px;height:14px;opacity:0.7;flex-shrink:0}
.sidebar a.active svg{opacity:1}
.sidebar .spacer{flex:1}

/* Main */
.main{overflow-y:auto;padding:24px 28px;scroll-behavior:smooth}

/* Page header */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-hdr h2{font-size:16px;font-weight:700;letter-spacing:-0.3px}

/* Cards */
.grid{display:grid;gap:14px}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.card{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:18px;transition:border-color 0.15s}
.card:hover{border-color:var(--border)}
.card h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:8px}
.card .value{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-1.2px;color:var(--text)}
.card .sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-weight:500}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-muted);padding:8px 12px;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border-subtle)}
tr{transition:background 0.1s}
tr:hover td{background:var(--surface2)}
tr.expandable{cursor:pointer}
.badge{display:inline-block;padding:2px 7px;border-radius:var(--radius-sm);font-size:10px;font-weight:600;font-family:var(--mono)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-accent{background:var(--accent-dim);color:var(--accent)}

/* Buttons */
.btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;transition:all 0.12s}
.btn-primary{background:var(--accent);color:oklch(15% 0.01 260)}
.btn-primary:hover{background:var(--accent-strong)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid oklch(68% 0.19 25 / 0.25)}
.btn-danger:hover{background:oklch(68% 0.19 25 / 0.2)}
.btn-ghost{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
.btn-sm{padding:4px 9px;font-size:10px}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border-subtle);padding-bottom:0}
.tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Filter pills */
.filters{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;background:var(--surface2);color:var(--text-dim);cursor:pointer;border:1px solid var(--border-subtle);transition:all 0.12s}
.pill:hover{color:var(--text);border-color:var(--border)}
.pill.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}

/* Terminal */
.terminal{background:oklch(11% 0.008 260);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;height:calc(100vh - 48px - 48px)}
.terminal-output{flex:1;overflow-y:auto;padding:12px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;color:var(--text-dim)}
.terminal-input{border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px}
.terminal-input span{color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:500;margin-right:8px}
.terminal-input input{flex:1;background:none;border:none;color:var(--text);font-family:var(--mono);font-size:12px;padding:12px 0}

/* Chart */
.chart-container{position:relative;height:80px;margin-top:10px}
canvas{width:100%!important;height:100%!important;display:block}

/* Log viewer */
.log-viewer{flex:1;overflow-y:auto;scroll-behavior:smooth}
.log-entry{font-family:var(--mono);font-size:11px;line-height:1.9;padding:1px 0;display:flex;gap:8px}
.log-time{color:var(--text-muted);flex-shrink:0}
.log-flag{color:var(--yellow);flex-shrink:0;min-width:16px}
.log-msg{color:var(--text-dim);word-break:break-all}

/* Activity feed */
.activity-item{padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:11px;display:flex;gap:8px;align-items:baseline}
.activity-item:last-child{border-bottom:none}
.activity-time{font-family:var(--mono);color:var(--text-muted);font-size:10px;flex-shrink:0}
.activity-msg{color:var(--text-dim)}

/* Members expand row */
.members-row td{padding:0;background:var(--surface2)}
.members-inner{padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px}
.member-item{font-size:11px;font-family:var(--mono);padding:3px 7px;border-radius:var(--radius-sm);background:var(--surface);display:flex;align-items:center;gap:5px}
.member-badge{font-size:10px;font-weight:700;width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:oklch(0% 0 0 / 0.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:420px;box-shadow:var(--shadow)}
.modal h2{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px}
.modal label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Toast */
.toast-container{position:fixed;bottom:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px}
.toast{padding:9px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--text);box-shadow:var(--shadow);animation:slideIn 0.2s ease}
.toast.success{border-color:oklch(72% 0.17 155 / 0.4);color:var(--green)}
.toast.error{border-color:oklch(68% 0.19 25 / 0.4);color:var(--red)}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* Detail panel */
.detail-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:14px}
.detail-panel h4{font-size:12px;font-weight:600;margin-bottom:10px}
.detail-hosts{font-family:var(--mono);font-size:11px;color:var(--text-dim);line-height:1.8}

/* Inline form row */
.form-row{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
.form-row .field{flex:1}
.form-row .field label{display:block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:3px}
.form-row .field input,.form-row .field select{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px}

/* Responsive */
@media(max-width:768px){
  .shell{grid-template-columns:1fr;grid-template-rows:48px 1fr 52px}
  .sidebar{order:1;flex-direction:row;overflow-x:auto;border-right:none;border-top:1px solid var(--border);padding:0 6px}
  .sidebar .nav-section,.sidebar .spacer{display:none}
  .sidebar a{padding:10px 12px;white-space:nowrap;border-left:none!important;flex-direction:column;gap:2px;font-size:9px}
  .sidebar a svg{width:16px;height:16px}
  .main{padding:14px}
  .grid-4{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="brand">eggdrop<span>.</span></div>
    <div class="live-status"><span class="dot" id="ws-dot"></span><span id="hdr-status">connecting...</span></div>
  </header>
  <nav class="sidebar" id="sidebar">
    <div class="nav-section">Monitor</div>
    <a href="#" data-view="dashboard" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a href="#" data-view="channels"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16M10 3l-2 18M16 3l-2 18"/></svg>Channels</a>
    <a href="#" data-view="users"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Users</a>
    <a href="#" data-view="logs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Logs</a>
    <a href="#" data-view="terminal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Terminal</a>
    <div class="nav-section">Manage</div>
    <a href="#" data-view="network"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><circle cx="5" cy="19" r="2"/><line x1="12" y1="7" x2="12" y2="10"/><line x1="13.5" y1="13.5" x2="17.5" y2="17.5"/><line x1="10.5" y1="13.5" x2="6.5" y2="17.5"/></svg>Network</a>
    <a href="#" data-view="irc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>IRC Control</a>
    <a href="#" data-view="config"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Config</a>
    <div class="spacer"></div>
    <div class="nav-section">System</div>
    <a href="#" data-view="system"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15 1.65 1.65 0 003.17 14H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68 1.65 1.65 0 0010 3.17V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>System</a>
  </nav>
  <main class="main" id="main"></main>
</div>

<div class="modal-backdrop" id="modal-backdrop"><div class="modal" id="modal-content"></div></div>
<div class="toast-container" id="toasts"></div>

<script>
"use strict";

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
function formatUptime(sec) {
  const d = Math.floor(sec / 86400), h = Math.floor((sec % 86400) / 3600), m = Math.floor((sec % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}
function formatTime(ts) {
  if (!ts) return '--';
  const d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

/* State */
let currentView = 'dashboard';
let ws = null, termWs = null;
let wsRetryDelay = 1000;
let trafficHist = [], perfHist = [];
let logBuffer = [];
let termHistory = [], termHistIdx = -1;
let termEcho = true, termSendCount = 0;
let logFilter = 'all';
let pinnedToBottom = true;

/* Auth */
function getToken() { return localStorage.getItem('webui_token') || ''; }
function setToken(t) { localStorage.setItem('webui_token', t); }
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

async function api(path, opts) {
  const cfg = { headers: authHeaders(), ...opts };
  try {
    const r = await fetch('/api/' + path, cfg);
    if (r.status === 401) { showLoginModal(); return null; }
    if (!r.ok) { const j = await r.json().catch(() => null); return j; }
    return await r.json();
  } catch { return null; }
}
async function apiPost(path, body) { return api(path, { method: 'POST', body: JSON.stringify(body) }); }
async function apiDelete(path, body) { return api(path, { method: 'DELETE', body: body ? JSON.stringify(body) : undefined }); }

/* Toast */
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* Modal */
function showModal(html) { $('#modal-content').innerHTML = html; $('#modal-backdrop').classList.add('show'); }
function hideModal() { $('#modal-backdrop').classList.remove('show'); }
$('#modal-backdrop').addEventListener('click', e => { if (e.target === e.currentTarget) hideModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideModal(); });

function showLoginModal() {
  showModal(`
    <h2>Authentication</h2>
    <label>Token</label>
    <input type="password" id="login-token" placeholder="Enter token...">
    <div class="actions"><button class="btn btn-primary" id="login-btn">Authenticate</button></div>
  `);
  setTimeout(() => {
    const inp = $('#login-token'), btn = $('#login-btn');
    inp.focus();
    const doLogin = async () => {
      const r = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: inp.value }) });
      if (r.ok) { setToken(inp.value); hideModal(); toast('Authenticated', 'success'); switchView(currentView); connectWS(); }
      else { toast('Invalid token', 'error'); inp.value = ''; inp.focus(); }
    };
    btn.addEventListener('click', doLogin);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  }, 50);
}

/* Navigation */
$$('#sidebar a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    $$('#sidebar a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    switchView(a.dataset.view);
  });
});

function switchView(view) {
  stopAutoRefresh();
  currentView = view;
  const r = { dashboard: renderDashboard, channels: renderChannels, users: renderUsers, logs: renderLogs, terminal: renderTerminal, network: renderNetwork, irc: renderIRC, config: renderConfig, system: renderSystem };
  (r[view] || r.dashboard)();
}

/* ================================================================
   DASHBOARD
   ================================================================ */
function renderDashboard() {
  $('#main').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:16px">
      <div class="card"><h3>Uptime</h3><div class="value" id="d-uptime">--</div><div class="sub" id="d-since"></div></div>
      <div class="card"><h3>Server</h3><div class="value" id="d-server" style="font-size:14px;word-break:break-all">--</div><div class="sub" id="d-nick"></div></div>
      <div class="card"><h3>Channels</h3><div class="value" id="d-chans">0</div><div class="sub" id="d-members">0 members</div></div>
      <div class="card"><h3>Users</h3><div class="value" id="d-users">0</div><div class="sub">registered</div></div>
    </div>
    <div class="grid grid-2" style="margin-bottom:16px">
      <div class="card">
        <h3>Traffic</h3>

async function refreshDashboard() {
  if (currentView !== 'dashboard') return;
  const [status, traffic, perf, channels] = await Promise.all([api('status'), api('traffic'), api('perf'), api('channels')]);
  if (status) {
    const el = id => document.getElementById(id);
    if (el('d-uptime')) el('d-uptime').textContent = formatUptime(status.uptime);
    if (el('d-since')) el('d-since').textContent = 'since ' + new Date(status.online_since * 1000).toLocaleDateString();
    if (el('d-server')) el('d-server').textContent = status.server || 'disconnected';
    if (el('d-nick')) el('d-nick').textContent = 'as ' + (status.nick || '--');
    if (el('d-chans')) el('d-chans').textContent = status.channels;
    if (el('d-users')) el('d-users').textContent = status.users;
    $('#hdr-status').textContent = (status.nick || '') + ' @ ' + (status.server || 'disconnected');
    if (channels) {
      let m = 0; channels.forEach(c => m += c.members);
      if (el('d-members')) el('d-members').textContent = m + ' members';
    }
  }
  if (traffic) {
    const el = id => document.getElementById(id);
    if (el('d-tin')) el('d-tin').textContent = formatBytes(traffic.in_today);
    if (el('d-tout')) el('d-tout').textContent = formatBytes(traffic.out_today);
    trafficHist.push({ i: traffic.in_today, o: traffic.out_today });
    if (trafficHist.length > 50) trafficHist.shift();
    drawSparkline('c-traffic', trafficHist, ['i', 'o'], ['oklch(75% 0.16 185)', 'oklch(72% 0.14 245)']);
  }
  if (perf) {
    const el = id => document.getElementById(id);
    const avg = perf.tick_avg_ns;
    if (el('d-tick')) el('d-tick').textContent = avg < 1000 ? avg + 'ns' : (avg / 1000).toFixed(1) + 'us';
    if (el('d-idle')) el('d-idle').textContent = perf.idle_pct + '%';
    if (el('d-binds')) el('d-binds').textContent = perf.bind_dispatches;
    perfHist.push({ v: avg });
    if (perfHist.length > 50) perfHist.shift();
    drawSparkline('c-perf', perfHist, ['v'], ['oklch(75% 0.16 185)']);
  }
  renderActivityFeed();
}

function renderActivityFeed() {
  const el = document.getElementById('d-activity');
  if (!el) return;
  const recent = logBuffer.slice(-6).reverse();
  el.innerHTML = recent.length ? recent.map(l =>
    `<div class="activity-item"><span class="activity-time">${esc(l.time || '')}</span><span class="activity-msg">${esc(l.msg || '')}</span></div>`
  ).join('') : '<div style="font-size:11px;color:var(--text-muted);padding:6px 0">No recent activity</div>';
}

function drawSparkline(id, data, keys, colors) {
  const canvas = document.getElementById(id);
  if (!canvas || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);
  keys.forEach((key, ki) => {
    const vals = data.map(d => d[key] || 0);
    const max = Math.max(...vals, 1);
    ctx.beginPath();
    ctx.strokeStyle = colors[ki];
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    vals.forEach((v, i) => {
      const x = (i / (data.length - 1)) * w;
      const y = h - 4 - (v / max) * (h - 8);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, colors[ki].replace(')', ' / 0.12)').replace('oklch(', 'oklch('));
    grad.addColorStop(1, 'transparent');
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

async function toggleMembers(row, chan) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('members-row')) { next.remove(); return; }

  if (!data) return;
  const tr = document.createElement('tr');

  tr.innerHTML = `<td colspan="6"><div class="members-inner">${data.map(m => {
    let badge = '', color = '';

    else if (m.voice) { badge = '+'; color = 'var(--blue)'; }
    return `<div class="member-item">

    </div>`;
  }).join('')}</div></td>`;

    e.stopPropagation();
    const act = btn.dataset.action, nick = btn.dataset.nick, ch = btn.dataset.chan;
    let r;

async function showChannelListsModal(chan, activeTab = 'bans') {
  const [bans, exempts, invites] = await Promise.all([
    api('channels/' + encodeURIComponent(chan) + '/bans'),
    api('channels/' + encodeURIComponent(chan) + '/exempts'),
    api('channels/' + encodeURIComponent(chan) + '/invites')
  ]);

  function listHtml(items, removeAction, addLabel, addPlaceholder, addAction) {
    const rows = (items && items.length)
      ? '<div style="max-height:160px;overflow-y:auto;margin-bottom:10px">' +
        items.map(b => `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-subtle)">
          <span style="font-family:var(--mono);font-size:11px">${esc(b.mask)}</span>
          <button class="btn btn-danger btn-sm list-remove" data-mask="${esc(b.mask)}" data-action="${removeAction}">Remove</button>
        </div>`).join('') + '</div>'
      : '<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">None</div>';
    return rows + `<div style="display:flex;gap:6px"><input class="list-add-mask" placeholder="${addPlaceholder}" style="flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px"><button class="btn btn-primary list-add-btn" data-action="${addAction}">${addLabel}</button></div>`;
  }

  showModal(`
    <h2>Channel Lists: ${esc(chan)}</h2>
    <div class="tabs" style="margin-bottom:12px">
      <span class="tab ${activeTab === 'bans' ? 'active' : ''}" data-tab="bans">Bans</span>
      <span class="tab ${activeTab === 'exempts' ? 'active' : ''}" data-tab="exempts">Exempts</span>
      <span class="tab ${activeTab === 'invites' ? 'active' : ''}" data-tab="invites">Invites</span>
    </div>
    <div id="lists-bans" style="display:${activeTab === 'bans' ? 'block' : 'none'}">${listHtml(bans, 'unban', 'Ban', '*!*@host', 'ban')}</div>
    <div id="lists-exempts" style="display:${activeTab === 'exempts' ? 'block' : 'none'}">${listHtml(exempts, 'unexempt', 'Exempt', '*!*@host', 'exempt')}</div>
    <div id="lists-invites" style="display:${activeTab === 'invites' ? 'block' : 'none'}">${listHtml(invites, 'uninvite', 'Invite', '*!*@host', 'invite')}</div>
    <div class="actions"><button class="btn btn-ghost" onclick="hideModal()">Close</button></div>
  `);

  setTimeout(() => {
    /* Tab switching */
    $$('.tab[data-tab]').forEach(t => t.addEventListener('click', () => {
      $$('.tab[data-tab]').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      ['bans', 'exempts', 'invites'].forEach(tab => {
        const el = document.getElementById('lists-' + tab);
        if (el) el.style.display = tab === t.dataset.tab ? 'block' : 'none';
      });
    }));

    /* Remove buttons */
    $$('.list-remove').forEach(btn => btn.addEventListener('click', async () => {
      const mask = btn.dataset.mask, action = btn.dataset.action;
      let r;
      if (action === 'unban') r = await apiPost('unban', { channel: chan, mask });
      else r = await apiPost('mode', { channel: chan, mode: (action === 'unexempt' ? '-e ' : '-I ') + mask });
      if (r && r.ok) { toast('Removed', 'success'); showChannelListsModal(chan, $$('.tab.active[data-tab]')[0]?.dataset.tab || 'bans'); }
      else toast('Failed', 'error');
    }));

    /* Add buttons */
    $$('.list-add-btn').forEach(btn => btn.addEventListener('click', async () => {
      const mask = btn.previousElementSibling.value.trim(), action = btn.dataset.action;
      if (!mask) return;
      let r;
      if (action === 'ban') r = await apiPost('ban', { channel: chan, mask });
      else r = await apiPost('mode', { channel: chan, mode: (action === 'exempt' ? '+e ' : '+I ') + mask });
      if (r && r.ok) { toast('Added', 'success'); showChannelListsModal(chan, $$('.tab.active[data-tab]')[0]?.dataset.tab || 'bans'); }
      else toast('Failed', 'error');
    }));
  }, 50);
}

function renderTerminal() {
  $('#main').innerHTML = `
    <div class="terminal">
      <div class="terminal-output" id="term-out"></div>
      <div class="terminal-input"><span>&gt;</span><input id="term-in" type="text" placeholder="enter command..." autofocus></div>
    </div>`;
  initTerminal();
}

function initTerminal() {
  const out = $('#term-out'), inp = $('#term-in');
  if (termWs && termWs.readyState === WebSocket.OPEN) termWs.close();
  termSendCount = 0; termEcho = true;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const tkn = getToken();
  termWs = new WebSocket(proto + '//' + location.host + '/w' + (tkn ? '?token=' + encodeURIComponent(tkn) : ''));
  termWs.addEventListener('message', e => {
    const clean = e.data.replace(/[\x01-\x02]/g, '');
    out.insertAdjacentHTML('beforeend', clean);
    out.scrollTop = out.scrollHeight;
    if (e.data.includes('\x01')) { inp.type = 'text'; termEcho = true; }
    else if (e.data.includes('\x02')) { inp.type = 'password'; termEcho = false; }
  });
  termWs.addEventListener('close', () => { out.insertAdjacentText('beforeend', '\n--- disconnected ---\n'); });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && termWs.readyState === WebSocket.OPEN) {
      const val = inp.value;
      termWs.send(val);
      if (termEcho) { out.insertAdjacentText('beforeend', val + '\n'); out.scrollTop = out.scrollHeight; }
      if (val.trim()) { termHistory.push(val); termHistIdx = termHistory.length; }
      inp.value = '';
      if (termSendCount++ === 0) { inp.type = 'password'; termEcho = false; }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (termHistIdx > 0) { termHistIdx--; inp.value = termHistory[termHistIdx]; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (termHistIdx < termHistory.length - 1) { termHistIdx++; inp.value = termHistory[termHistIdx]; }
      else { termHistIdx = termHistory.length; inp.value = ''; }
    }
  });
  inp.focus();
}

async function loadIRCChannels() {
  const data = await api('channels');
  if (!data) return;
  const opts = data.map(c => `<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
  ['say-chan', 'kick-chan', 'mode-chan', 'op-chan', 'voice-chan', 'invite-chan', 'ban-chan'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = opts; });
}

/* ================================================================
   WEBSOCKET (live push)
   ================================================================ */
function connectWS() {
  if (ws && ws.readyState <= 1) ws.close();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const tkn = getToken();
  ws = new WebSocket(proto + '//' + location.host + '/ws' + (tkn ? '?token=' + encodeURIComponent(tkn) : ''));
  ws.addEventListener('open', () => { wsRetryDelay = 1000; $('#ws-dot').classList.remove('disconnected'); });
  ws.addEventListener('close', () => {
    $('#ws-dot').classList.add('disconnected');
    setTimeout(connectWS, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay * 2, 30000);
  });
  ws.addEventListener('message', e => {
    try {
      const frame = JSON.parse(e.data);
      if (frame.type === 'log' && frame.data) {
        logBuffer.push(frame.data);
        if (logBuffer.length > 500) logBuffer.shift();
        if (currentView === 'logs') renderLogEntries();
        if (currentView === 'dashboard') renderActivityFeed();
      } else if (frame.type === 'status' && frame.data) {
        const s = frame.data;
        $('#hdr-status').textContent = (s.nick || '') + (s.server ? ' @ ' + s.server : '');
        if (currentView === 'dashboard') {
          const el = id => document.getElementById(id);
          if (el('d-uptime') && s.uptime != null) el('d-uptime').textContent = formatUptime(s.uptime);
          if (el('d-chans') && s.channels != null) el('d-chans').textContent = s.channels;
          if (el('d-users') && s.users != null) el('d-users').textContent = s.users;
        }
      }
    } catch {}
  });
}

/* Auto-refresh */
let autoRefreshInterval = null;
function startAutoRefresh(fn, ms = 10000) {
  stopAutoRefresh();
  autoRefreshInterval = setInterval(fn, ms);
}
function stopAutoRefresh() {
  if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
}
setInterval(() => { if (currentView === 'dashboard') refreshDashboard(); }, 8000);

/* Boot */
switchView('dashboard');
connectWS();
