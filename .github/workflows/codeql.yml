name: CodeQL

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (C)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev tcl-dev

      - name: Build
        run: ./configure && make config && make -j4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
