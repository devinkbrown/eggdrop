name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libssl-dev tcl-dev

      - name: Build with Meson
        run: meson setup build_ci && ninja -j$(nproc) -C build_ci

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja openssl@3 tcl-tk

      - name: Set up Homebrew pkg-config paths
        run: |
          BREW=$(brew --prefix)
          echo "PKG_CONFIG_PATH=${BREW}/opt/openssl@3/lib/pkgconfig:${BREW}/opt/tcl-tk/lib/pkgconfig" >> $GITHUB_ENV
          echo "LDFLAGS=-L${BREW}/opt/openssl@3/lib -L${BREW}/opt/tcl-tk/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I${BREW}/opt/openssl@3/include -I${BREW}/opt/tcl-tk/include" >> $GITHUB_ENV
          # Meson reads CFLAGS (not CPPFLAGS) for compiler include paths used in
          # feature-probe tests (cc.has_header, cc.has_function, etc.).
          echo "CFLAGS=-I${BREW}/opt/openssl@3/include -I${BREW}/opt/tcl-tk/include" >> $GITHUB_ENV

      - name: Build with Meson
        run: |
          meson setup build_ci 2>&1
          ninja -j$(sysctl -n hw.logicalcpu) -C build_ci 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== Build failed — last 300 lines of output ==="
            tail -300 /tmp/build.log
          fi
          exit "$BUILD_EXIT"
