name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libssl-dev tcl-dev

      - name: Build with Meson
        run: meson setup build_ci && ninja -C build_ci

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja openssl tcl-tk

      - name: Build with Meson
        run: meson setup build_ci && ninja -C build_ci
