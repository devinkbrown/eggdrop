# Eggdrop TOML configuration file
# This is the complete, fully-documented replacement for eggdrop.conf.
#
# Run the bot:
#   eggdrop eggdrop.toml          (start — user file created automatically on first run)
#   eggdrop -t eggdrop.toml       (foreground / terminal mode)
#
# Quick start:
#   eggdrop --setup mybot.toml    (interactive wizard — no editing needed)
#
# No chmod u+x required. This file is NOT executed as a shell script.
# Tcl scripts are still loaded via [scripts] — see the bottom of this file.
#
# Full documentation: doc/settings/
# Support           : https://www.eggheads.org  /  Libera #eggdrop

# ────────────────────────────────────────────────────────────────────────────
# MODULES
# List modules to load at startup. Comment out lines you don't need.
# Module files live in the mod_path directory (see [paths]).
# ────────────────────────────────────────────────────────────────────────────

[modules]
load = [
  "pbkdf2",     # Generation-2 userfile encryption (recommended)
  "blowfish",   # Legacy userfile encryption support
  "channels",   # Channel tracking and management
  "server",     # Core IRC server support
  "ctcp",       # CTCP functionality
  "irc",        # Basic IRC functionality
  # "transfer",   # DCC SEND/GET and userfile transfer
  # "share",      # Userfile sharing between botnets
  # "compress",   # Compress userfiles during transfer (requires zlib)
  # "filesys",    # Built-in file server
  "notes",      # Store notes for offline users
  "console",    # Persist console settings across restarts
  # "seen",       # Basic !seen command
  # "assoc",      # Party-line channel naming
  "uptime",     # Report uptime to https://www.eggheads.org/uptime/
  # "ident",      # Ident daemon support
  # "twitch",     # Twitch gaming service support
  # "webui",      # Browser-based administration UI (requires TLS)
]

# ────────────────────────────────────────────────────────────────────────────
# BOT IDENTITY
# ────────────────────────────────────────────────────────────────────────────

[bot]
# Primary nick used on IRC and on the botnet.
nick     = "Lamestbot"

# Alternate nick if the primary nick is taken. '?' → random digit.
altnick  = "Llamab?t"

# IRC GECOS / "real name" field. Cannot be blank.
realname = "/msg LamestBot hello"

# IRC username (ident). Ignored when an ident daemon is running.
username = "lamest"

# Contact shown in .status and /msg help. Please fill this in.
admin    = "Lamer <email: lamer@lamest.lame.org>"

# IRC network name (informational; shared with other bots).
network  = "I.didn't.edit.my.config.file.net"

# Timezone name (3+ letters). Used for timestamps.
timezone = "EST"

# UTC offset in hours (positive = west of prime meridian).
offset   = "5"

# ── Owner (REQUIRED) ────────────────────────────────────────────────────────
# Comma-separated list of bot owner handles.
# On first run, if no user file exists, the bot creates it automatically with
# these handles as owners (USER_MASTER | USER_OWNER).  No -m flag needed.
# YOU MUST UNCOMMENT AND EDIT THIS.
# owner = "MyNick, MyOtherNick"

# Separate botnet nick. Defaults to the IRC nick if unset.
# botnet_nick = "LlamaBot"

# Pid file path. Defaults to "pid.<botnetnick>" if unset.
# pidfile = "pid.LamestBot"

# Who gets a note when a new user is learned? Typically "$owner".
notify_newusers = "$owner"

# Default flags for new users added via the 'hello' msg command.
default_flags = "hp"

# User-defined whois fields shown in .whois output.
whois_fields = "url birthday"

# ────────────────────────────────────────────────────────────────────────────
# SERVERS
# Format for each entry:
#   "host:port"           plain connection
#   "host:+port"          SSL/TLS connection
#   "host:+port:password" SSL/TLS with server password
#
# The bot cycles through the list when disconnected.
# YOU MUST CHANGE THESE to your IRC network's servers.
# ────────────────────────────────────────────────────────────────────────────

[servers]
list = [
  "you.need.to.change.this:6667",
  "another.example.com:6669:password",
  "2001:db8:618:5c0:263:::6669:password",
  "ssl.example.net:+7000",
]

# ────────────────────────────────────────────────────────────────────────────
# CHANNELS
# Channels the bot should join automatically.
# ────────────────────────────────────────────────────────────────────────────

[channels]
list = ["#egghelp"]

# ────────────────────────────────────────────────────────────────────────────
# PER-CHANNEL SETTINGS  [[chanset]]
#
# One [[chanset]] block per channel.  The channel must appear in [channels]
# list above (or be added at runtime) before these settings take effect.
# channel = "#name" is always required and must be the first key.
#
# ── Boolean flags (true = enable, false = disable) ──────────────────────────
#   autoop          — op users with +o flag on join (insecure; prefer protectops)
#   autohalfop      — halfop users with +l flag on join
#   autovoice       — voice users with +v flag on join
#   bitch           — only users with the +o flag may hold op
#   cycle           — cycle (part/rejoin) when the channel loses all ops
#   dontkickops     — never kick ops; prevents fighting with other bots
#   dynamicbans     — activate bans only when needed (reduces ban list)
#   dynamicexempts  — activate exempts only when needed
#   dynamicinvites  — activate invites only when needed
#   enforcebans     — kick users who match a ban when the ban is set
#   greet           — announce a user's info line when they join
#   inactive        — do not join this channel (preserves settings)
#   nodesynch       — allow non-ops to set modes (prevents fighting services)
#   protectfriends  — re-op users with the +f flag if deopped
#   protecthalfops  — re-halfop users with +l flag if dehalfopped
#   protectops      — re-op users with the +o flag if deopped
#   revenge         — punish users who deop/kick/ban the bot or valid ops
#   revengebot      — like revenge, but only triggered by other bots
#   secret          — hide this channel from botnet listings
#   seen            — respond to !seen queries in the channel
#   shared          — share channel user data with linked bots
#   static          — channel cannot be removed dynamically
#   statuslog       — log channel status line every 5 minutes
#   userbans        — allow users to set bans directly (disable to restrict)
#   userexempts     — allow users to set exempts directly
#   userinvites     — allow users to set invites directly
#
# ── Valued options ──────────────────────────────────────────────────────────
#   chanmode         = "+modes"   — enforce these channel modes
#                                   include +k key to protect a join key,
#                                   +l N to enforce a user limit
#   idle_kick        = N          — kick idle users after N minutes (0 = off)
#   stopnethack_mode = 0-6        — netsplit protection strictness (0 = off)
#   revenge_mode     = 0-3        — how aggressively to punish bad actors
#                                   0=deop, 1=deop+flag, 2=+kick, 3=+ban
#   ban_type         = 0-39       — mask type for auto-bans (default: 3)
#   ban_time         = N          — temporary ban lifetime in minutes (0 = never)
#   exempt_time      = N          — temporary exempt lifetime in minutes
#   invite_time      = N          — temporary invite lifetime in minutes
#   flood_chan        = "N:S"     — pub-message flood: N lines per S seconds
#   flood_ctcp       = "N:S"     — CTCP flood threshold
#   flood_join       = "N:S"     — join flood threshold
#   flood_kick       = "N:S"     — kick flood threshold
#   flood_deop       = "N:S"     — deop flood threshold
#   flood_nick       = "N:S"     — nick-change flood threshold
#   aop_delay        = "N:M"     — random delay (N–M seconds) before auto-op
#   need_op          = "script"  — Tcl to run when the bot needs ops
#   need_invite      = "script"  — Tcl to run when the bot needs an invite
#   need_key         = "script"  — Tcl to run when the bot needs the channel key
#   need_unban       = "script"  — Tcl to run when the bot is banned
#   need_limit       = "script"  — Tcl to run when the channel is at limit
#
# ── IRCX / Ophion only ──────────────────────────────────────────────────────
#   ownerkey          = "key"    — OWNERKEY credential for +q on join
#   ircx_create       = true     — CREATE the channel if it does not exist
#   ircx_create_modes = "+modes" — modes applied immediately after CREATE
#
# ── Examples ────────────────────────────────────────────────────────────────
# [[chanset]]
# channel          = "#egghelp"
# chanmode         = "+nts"
# cycle            = false        # do not cycle when ops are lost
# idle_kick        = 30
# flood_chan        = "20:60"
# revenge_mode     = 1
#
# [[chanset]]
# channel          = "#private"
# chanmode         = "+insk s3cr3t"  # +i +n +s +k with key "s3cr3t"
# bitch            = true
# protectops       = true
#
# [[chanset]]
# channel          = "#ophion-channel"
# ownerkey         = "s3cr3t"
# ircx_create      = true
# ircx_create_modes = "+nts"
# ────────────────────────────────────────────────────────────────────────────

# ── Channel defaults (channels.mod) ─────────────────────────────────────────
# These set the starting values for all channels. Individual channels can
# be overridden with .chanset in the DCC console.
#
# Show user info/URL in public channels.
use_info = 1

# Allow public-say commands (.say, .act) from the partyline.
allow_ps = 0

# Share greeting messages with other bots.
# share_greet = 0

# Default chanmode enforced on managed channels.
default_chanmode = "nt"

# Ban/exempt/invite expiry in minutes (0 = never expire).
default_ban_time    = 120
default_exempt_time = 60
default_invite_time = 60

# Ban type: 1=*!*@host, 2=*!*user@host, 3=*!*user@*.host, 4=*!*@*.host, etc.
default_ban_type = 3

# Kick idle users after N minutes (0 = disabled).
default_idle_kick = 0

# Flood protection thresholds (count:seconds). Adjust per your network.
default_flood_chan = "15:60"
default_flood_deop = "3:10"
default_flood_kick = "3:10"
default_flood_join = "5:60"
default_flood_ctcp = "3:60"
default_flood_nick = "5:60"

# Minimum and maximum seconds delay before auto-opping a user.
default_aop_delay = "5:30"

# Stopnethack mode (0=off, 1–4 vary strictness).
default_stopnethack_mode = 0

# Revenge mode for getting deoped/kicked (0=off, 1–3 vary strictness).
default_revenge_mode = 0

# ────────────────────────────────────────────────────────────────────────────
# LOGGING
# Each entry: "flags channel logfile"
#
# Common flag letters:
#   m  private messages/ctcps    o  commands / errors
#   c  channel text              j  joins / parts / quits
#   k  kicks / bans / modes      s  server messages
#   b  bot messages              e  misc errors
#   p  public msg/notice (chan)  *  all of the above
# User-defined levels: 1–8 (usable by Tcl scripts)
# Raw-traffic flags (d h r t u v) — only visible to +n users.
#
# The channel field can be a specific channel name or "*" for all channels.
# ────────────────────────────────────────────────────────────────────────────

[logging]
entries = [
  "mco * logs/eggdrop.log",
  # "jpk #lamest logs/lamest.log",   # channel-specific log example
]

# Maximum number of simultaneous open log files (minimum 5).
max_logs = 20

# Maximum log file size in kilobytes (0 = unlimited).
max_logsize = 0

# Log raw IRC/botnet traffic (large security risk — +n users only).
raw_log = 0

# Add timestamps to log entries.
log_time = 1

# Timestamp format (strftime). Keep under 32 chars.
timestamp_format = "[%H:%M:%S]"

# Keep all logfiles forever (suffix with date).
keep_all_logs = 0

# Log file date suffix format (strftime). Default: "04May2000".
logfile_suffix = ".%d%b%Y"

# Hour and minute (24h, HHMM) when logfiles rotate. 300 = 03:00.
switch_logfiles_at = 300

# Suppress "Writing user file…" messages (1), backup messages (2),
# and "Switching logfiles…" messages (3).
quiet_save = 0

# ────────────────────────────────────────────────────────────────────────────
# FILE PATHS
# ────────────────────────────────────────────────────────────────────────────

[paths]
# Eggdrop user and channel data files.
userfile  = "LamestBot.user"
chanfile  = "LamestBot.chan"

# Unix permissions on the user file (octal string).
userfile_perm = "0600"

# Storage backend: "lmdb" (default, crash-safe) or "flat" (legacy text files).
# LMDB provides atomic writes and instant crash recovery while maintaining full
# compatibility with Tcl commands and share module transfers.
store_backend = "lmdb"

# Path to the LMDB database file.  Defaults to "<botnetnick>.mdb" if empty.
# store_path = ""

# Help files directory.
help_path = "help/"

# Text files directory (MOTD, banner, etc.).
text_path = "text/"

# MOTD displayed to users on DCC/telnet connect.
motd = "text/motd"

# Banner displayed before the login prompt on telnet.
telnet_banner = "text/banner"

# Directory for temporary files. Historically "tempdir" — now unused by core.
# temp = "/tmp"

# Module directory (compiled .so / .dll files).
mod_path = "modules/"

# Notes file (used by the notes module).
notefile = "LamestBot.notes"

# ────────────────────────────────────────────────────────────────────────────
# NETWORKING
# ────────────────────────────────────────────────────────────────────────────

[network]
# Bind to a specific IPv4 address (multi-homed hosts).
# vhost4 = "99.99.0.0"

# Bind to a specific IPv6 address.
# vhost6 = "2001:db8::c001:b07"

# External IP for NAT setups (home routers, etc.).
# nat_ip = "127.0.0.1"

# Address to listen on for DCC and telnet connections.
# On multi-homed hosts set this to the interface the bot should accept on.
# Defaults to all interfaces ("") which is correct in most cases.
# listen_addr = ""

# Prefer IPv6 connections when available.
prefer_ipv6 = 0

# Default IRC port when none is specified in a server entry.
default_port = 6667

# Seconds before an IRC connection attempt times out.
connect_timeout = 15

# DNS lookup timeout in seconds.
# resolve_timeout = 5

# Reserved port range for DCC (e.g. "2010:2020").
# reserved_portrange = "2010:2020"

# ── DNS-over-TLS (optional) ─────────────────────────────────────────────────
# dns_dot_server     = "1.1.1.1"
# dns_dot_port       = 853
# dns_dot_servername = "cloudflare-dns.com"

# ────────────────────────────────────────────────────────────────────────────
# SSL / TLS SETTINGS
# ────────────────────────────────────────────────────────────────────────────

[ssl]
# ssl_privatekey = "eggdrop.key"
# ssl_certificate = "eggdrop.crt"
ssl_capath = "/etc/ssl/"
# ssl_cafile = ""
# ssl_ciphers = ""
# ssl_dhparam = "dhparam.pem"
# ssl_chain_depth = 9         # max certificate chain depth (Tcl: ssl-chain-depth)
# ssl_cert_auth = 0
# ssl_verify_dcc = 0
# ssl_verify_bots = 0
# ssl_verify_clients = 0
# ssl_verify_server = 0       # verify SSL for IRC server connections

# ────────────────────────────────────────────────────────────────────────────
# SECURITY
# ────────────────────────────────────────────────────────────────────────────

[security]
# Only permanent owners may use .tcl, .set, .python (1) or also .dump (2).
# Setting to 0 is a security risk — gives owner shell-level access.
must_be_owner = 1

# Hide the "Eggdrop" server string in DCC/telnet banners.
stealth_telnets = 0

# Custom stealth login prompt (if stealth_telnets is 1).
# stealth_prompt = "\n\nNickname.\n"

# Require users to provide a password before DCC chat is accepted.
require_p = 1

# Allow telnet connections without a password. Dangerous!
open_telnets = 0

# Protect telnet port from brute-force attempts.
protect_telnet = 0

# Sanity-check DCC filenames.
dcc_sanitycheck = 0

# Maximum DCC flood connections (per time window).
dcc_flood_thr = 3

# Max telnet logins per minute before flood protection triggers.
telnet_flood = "16:60"

# Extra paranoia for telnet flood detection.
paranoid_telnet_flood = 1

# Enable CIDR support for b/e/I modes.
cidr_support = 0

# Show OS name and release in .status output.
show_uname = 1

# ────────────────────────────────────────────────────────────────────────────
# BOT BEHAVIOUR
# ────────────────────────────────────────────────────────────────────────────

[behaviour]
# Maximum simultaneous socket connections.
max_socks = 100

# Allow +d and +k users to use commands bound as "-|-".
allow_dk_cmds = 1

# Seconds to wait before re-checking a duplicate bot claim.
dupwait_timeout = 5

# Maximum time (s) between server pings before assuming a stoned server.
check_stoned = 1

# Quit on unrecognised server error codes.
serverror_quit = 1

# How many queued server messages before the queue is dropped.
max_queue_msg = 300

# Fire bindings even when the source is on the ignore list.
trigger_on_ignore = 0

# Prevent identical binds from being added twice.
exclusive_binds = 0

# Stack commands sent to the server.
double_mode   = 1
double_server = 1
double_help   = 1

# Optimize KICK commands (combine multi-user kicks).
optimize_kicks = 1

# Maximum recursion depth for bind stacks.
stack_limit = 4

# Hourly update check minute (0–59).
hourly_updates = 0

# Ignore time in seconds for flood protection.
ignore_time = 15

# Remote-boot authentication level (0=none, 1=owner only, 2=always require pw).
remote_boots = 2

# Propagate unlink commands across the botnet.
share_unlinks = 1

# Seconds to wait before assuming a split user has quit.
wait_split = 600

# Seconds to wait before no longer displaying split-info.
wait_info = 180

# IRC ident timeout in seconds.
ident_timeout = 5

# Display a text banner (text/banner) at the telnet login prompt.
use_telnet_banner = 0

# Expire bans/exempts/invites on channels even when the bot is alone.
force_expire = 0

# Share channel greeting messages when syncing with linked bots.
share_greet = 0

# ────────────────────────────────────────────────────────────────────────────
# SERVER / IRC MODULE SETTINGS
# ────────────────────────────────────────────────────────────────────────────

[irc]
# IRC network type. Affects mode/ban handling.
# Values: EFnet IRCnet Undernet DALnet Libera QuakeNet Rizon Twitch Ophion
# Use "Ophion" to enable full IRCX/Ophion protocol support (see [ircx] below).
net_type = "EFnet"

# Maximum nick length. 0 = auto-detect via ISUPPORT NICKLEN (recommended).
# Override only if your network doesn't send ISUPPORT or you need a hard cap.
# Default varies by net_type: EFnet=9, IRCnet=15, Undernet/Rizon/Ophion=30.
# nick_len = 0

# CTCP reply mode. 0 = normal, 1 = ignore all, 2 = reply to ctcp in channel.
ctcp_mode = 0

# Don't bounce bans set by other bots on the channel.
bounce_bans    = 0
bounce_exempts = 0
bounce_invites = 0
bounce_modes   = 0

# Learn new users from the IRC userbase.
learn_users = 0

# Allow /msg hello to add new users (requires learn_users=1 or -m startup).
# Set to 0 to disable the hello MSG command entirely.
allow_hello = 1

# Allow /msg addhost <pass> <hostmask> to add a host to a user record.
# Set to 0 to disable the addhost MSG command entirely.
allow_addhost = 1

# Buffer length for mode strings.
mode_buf_length = 200

# Characters that grant op status (usually "@").
opchars = "@"

# Suppress info if there is no channel record for the user.
no_chanrec_info = 0

# Prevent mixing ban types (IP-only vs. nick!user@host).
prevent_mixing = 1

# ── Server connection behaviour ─────────────────────────────────────────────
# Seconds between reconnect attempts after disconnection.
server_cycle_wait = 60

# Seconds before an IRC server is declared unresponsive (no PING reply).
server_timeout = 60

# Try to reclaim the bot's primary nick if it's in use.
keep_nick = 1

# Silently drop INVITE/KICK/etc. while the bot has no channel record.
quiet_reject = 1

# Fold incoming CTCP commands to lowercase before matching.
lowercase_ctcp = 0

# Number of CTCP requests to answer per burst (0 = answer all).
answer_ctcp = 3

# Maximum messages per second to server (flood rate limit).
msg_rate = 2

# ── IRC capability settings ──────────────────────────────────────────────────
# Request ACCOUNT-NOTIFY CAP (tells bot when nick's account changes).
account_notify = 1

# Request EXTENDED-JOIN CAP (includes account name in JOIN messages).
extended_join = 1

# ── Message flood limits ─────────────────────────────────────────────────────
# Max private messages before flood protection triggers (count:seconds).
flood_msg = "5:60"

# Max CTCP requests before flood protection triggers (count:seconds).
flood_ctcp = "3:60"

# ── Additional IRC capabilities (CAP negotiation) ────────────────────────────
# Request additional CAP capabilities beyond the built-in set.
# Space-separated list of extra CAP names.
# cap_request = ""

# Enable specific optional CAPs (1=request, 0=skip).
away_notify   = 0     # away-notify: receive AWAY notices for tracked users
invite_notify = 0     # invite-notify: receive INVITE notifications in channel
message_tags  = 0     # message-tags: enable IRCv3 message tags
account_tag   = 0     # account-tag: include account in tagged messages
echo_message  = 0     # echo-message: receive own sent PRIVMSGs back from server

# Note: batch, labeled-response, msgid, standard-replies, chghost, setname,
# multi-prefix, userhost-in-names, and Ophion caps (ophion/prop-notify,
# ophion/multi-prefix, draft/chathistory) are always auto-requested when
# advertised by the server.

# ── Advanced IRC mode / kick settings ───────────────────────────────────────
# Number of channel modes to include in each MODE command (default: 3).
# Most networks allow 3–6; set by net_type automatically.
# modes_per_line = 3

# Kick method: 0=single KICK, 1=multi-user KICK (default: 1).
# kick_method = 1

# Include +l and +k when computing current channel modes (default: 1).
# Disable only if your network has unusual mode-tracking behaviour.
# include_lk = 1

# Require RFC-compliant mode-change tracking (default: 1, 0 for Undernet).
# rfc_compliant = 1

# Use ircu-style short 354 responses to /WHO (Undernet / ircu networks).
# use_354 = 0

# Track channel invites by key (+I modes with key argument).
# invite_key = 1

# Maximum bans/exempts/invites/modes per channel.
# Normally set automatically by net_type — override only when needed.
# max_bans    = 30
# max_exempts = 20
# max_invites = 20
# max_modes   = 30

# Check for IRCnet +r (registered-only) channel mode.
# check_mode_r = 0

# Use server-side message penalty accounting to throttle output.
# Recommended for IRCnet (set automatically when net_type = "IRCnet").
# use_penalties = 0

# Fast dequeue algorithm: 0=off, 2=faster, 3=fastest (for Undernet/ircu).
# Set automatically by net_type — override if you know your network.
# use_fastdeq = 0

# ── Server connect hooks ──────────────────────────────────────────────────────
# Raw IRC commands sent immediately after the bot registers on the server.
# Example: "UMODE2 +x" to set an invisible hostmask.
# init_server = ""

# Raw IRC commands sent before the bot begins the connection/registration.
# Rarely needed; used for bnc/proxy authentication protocols.
# connect_server = ""

# Stackable server commands (space-separated).  Commands in this list can
# be merged into fewer lines to reduce server queue usage.
# stackable_commands = ""

# Secondary stackable commands list.
# stackable2_commands = ""

# ── Proxy / firewall ─────────────────────────────────────────────────────────
# SOCKS4/5 or Sun passthru proxy.  Prefix with '!' for Sun telnet passthru.
# firewall = "socks.example.com:1080"

# ────────────────────────────────────────────────────────────────────────────
# SASL AUTHENTICATION (server.mod)
# Authenticate to IRC services via SASL during connection registration.
# ────────────────────────────────────────────────────────────────────────────

[sasl]
# Enable SASL authentication (0=off, 1=on, 2=require — disconnect if it fails).
sasl = 0

# Authentication mechanism:
#   0 = PLAIN               (username + password, plaintext — use only with SSL)
#   1 = ECDSA-NIST256P-CHALLENGE
#   2 = EXTERNAL            (client certificate)
#   3 = SCRAM-SHA-256
#   4 = SCRAM-SHA-512
#   5 = ECDH-X25519-CHALLENGE
sasl_mechanism = 0

# SASL username (PLAIN/SCRAM mechanisms).
# sasl_username = "MyNick"

# SASL password (PLAIN/SCRAM mechanisms). Only used over SSL — never plaintext!
# sasl_password = "hunter2"

# Path to ECDSA private key file (ECDSA-NIST256P-CHALLENGE mechanism).
# sasl_ecdsa_key = "eggdrop.pem"

# Path to X25519 private key file (ECDH-X25519-CHALLENGE mechanism).
# sasl_x25519_key = "eggdrop-x25519.pem"

# Continue connecting even if SASL authentication fails.
sasl_continue = 1

# Seconds before SASL handshake times out.
sasl_timeout = 15

# ────────────────────────────────────────────────────────────────────────────
# CTCP REPLIES (ctcp.mod)
# Override the default CTCP VERSION / FINGER / USERINFO responses.
# Leave commented to use the built-in eggdrop version string.
# ────────────────────────────────────────────────────────────────────────────

[ctcp]
# ctcp_version  = "Eggdrop v1.9 (Linux)"
# ctcp_finger   = "Eggdrop v1.9 (Linux)"
# ctcp_userinfo = "Eggdrop v1.9 (Linux)"

# ────────────────────────────────────────────────────────────────────────────
# IRCX / OPHION NETWORK SUPPORT
#
# IRCX (Internet Relay Chat eXtended) is a Microsoft extension to the IRC
# protocol that adds channel properties (PROP), access lists (ACCESS),
# channel creation (CREATE), persistent channels, and the +q owner mode.
#
# Ophion is a modern IRCv3 server that implements IRCX extensions.
# Repository: https://github.com/devinkbrown/ophion
#
# To enable IRCX support, set net_type = "Ophion" in the [irc] section.
# The bot will automatically:
#   1. Send the IRCX command after login to negotiate IRCX mode
#   2. Request ophion/prop-notify and ophion/multi-prefix capabilities
#   3. Handle +q (owner) mode in channel mode parsing
#   4. Support CREATE, PROP, and ACCESS commands via Tcl
#   5. Auto-request owner on configured channels via OWNERKEY
#
# IRCX-aware Tcl commands (available when connected to an IRCX server):
#
#   ircxprop <target> <propname> [value]
#     Read or write a channel/user property.
#     Examples:
#       ircxprop #lobby TOPIC "Welcome to the lobby!"
#       ircxprop #lobby MEMBERKEY "joinpass"
#       ircxprop #lobby OWNERKEY  "secretkey"   ;# write-only, owners only
#       ircxprop #lobby MEMBERLIMIT "50"
#       ircxprop #lobby PICS ""               ;# clear PICS rating
#       ircxprop #lobby LAG "0"               ;# no artificial delay
#       ircxprop #lobby OID                   ;# read unique channel ID
#
#   ircxaccess <channel> list|add|del [level] [mask]
#     Manage the channel access list.  Levels: OWNER HOST VOICE GRANT DENY QUIET
#     Examples:
#       ircxaccess #lobby list
#       ircxaccess #lobby add OWNER *!*@trusted.example.com
#       ircxaccess #lobby add HOST  *!*@ops.example.com
#       ircxaccess #lobby add VOICE *!*@friends.example.com
#       ircxaccess #lobby add GRANT *!*@regular.user         ;# bypass ban
#       ircxaccess #lobby add DENY  *!*@banned.user
#       ircxaccess #lobby del *!*@ops.example.com
#
#   ircxcreate <channel> [modes]
#     Create a channel — bot becomes owner (+q) automatically.
#     On Ophion, use +P to make the channel persistent (survives when empty).
#     Examples:
#       ircxcreate #newchannel +nt
#       ircxcreate #lobby +ntP          ;# +P = persistent channel
#
#   ircxautoowner <channel> [ownerkey] [create 0|1] [modes]
#     Configure a channel for auto-owner on every server connect.
#     When the bot joins the channel it sends PROP OWNERKEY to get +q.
#     If create=1 and the channel is empty, the bot will CREATE it.
#     Examples:
#       ircxautoowner #lobby mykey 0
#       ircxautoowner #main s3cr3t 1 +nt
#       ircxautoowner #ops "" 0         ;# no ownerkey, skip create
#
#   ircxnegotiate
#     Manually trigger IRCX mode negotiation (sends the IRCX command).
#
#   botisowner [channel]
#     Returns 1 if the bot has +q owner mode on the channel.
#
#   isowner <nick> <channel>
#     Returns 1 if <nick> has +q owner mode on the channel.
#
# Tcl bind points:
#   bind evnt - ircx-prop        ;# fired when a property is received
#   bind evnt - ircx-prop-change ;# fired when PROP notify arrives
#   bind evnt - ircx-join        ;# fired when bot joins a channel on Ophion
#
# Tcl variables set automatically by the IRCX engine:
#   ircx-enabled        ;# 1 after RPL_IRCX (800) received
#   ircx-auto-negotiate ;# 1 = send IRCX command automatically on connect
#   ircx-owner-support  ;# 1 if server supports +q mode
#   ircx-prop-support   ;# 1 if server supports PROP command
#   ircx-network        ;# network name from RPL_IRCX (800)
#   ircx-ownerkey       ;# global default OWNERKEY for auto-owner channels
# ────────────────────────────────────────────────────────────────────────────

[ircx]
# Automatically send the IRCX command after login when net-type = "Ophion".
# This puts the bot into IRCX mode (confirmed by 800 RPL_IRCX).
# Set to 0 and call ircxnegotiate manually if you need deferred negotiation.
ircx_auto_negotiate = 1

# Global OWNERKEY used by ircxautoowner when no channel-specific key is set.
# An OWNERKEY is a shared secret — providing it on JOIN grants +q (owner).
# Leave empty if your channels do not use an OWNERKEY.
# ircx_ownerkey = "my-secret-key"
ircx_ownerkey = ""

# ── Quick-start: connecting to an Ophion server ──────────────────────────────
#
# 1. Set net-type to Ophion in [irc]:
#      net_type = "Ophion"
#
# 2. Add your server in [servers]:
#      list = ["irc.example.net:6667"]
#
# 3. Register channels for auto-owner in [tcl]:
#      code = """
#      # Registers channels at startup; bot joins with OWNERKEY when
#      # IRCX is confirmed (800 RPL_IRCX), getting +q automatically.
#      ircxautoowner #lobby myownerkey 1
#      ircxautoowner #ops   adminkey   0
#      """
#
# 4. Optionally set up access lists:
#      code = """
#      bind evnt - init-server {
#        ircxaccess #lobby add HOST  *!*@trusted.example.com
#        ircxaccess #lobby add VOICE *!*@friends.example.com
#        ircxaccess #lobby add DENY  *!*@banned.example.com
#      }
#      """
# ─────────────────────────────────────────────────────────────────────────────

# ────────────────────────────────────────────────────────────────────────────
# DCC / FILE TRANSFER (transfer.mod)
# ────────────────────────────────────────────────────────────────────────────

[transfer]
# Maximum simultaneous downloads.
max_dloads = 3

# DCC transfer block size in bytes (0 = single send).
dcc_block = 0

# Seconds before an idle DCC transfer times out.
xfer_timeout = 30

# Unlink (delete) partially-received files when a share transfer fails.
sharefail_unlink = 0

# ────────────────────────────────────────────────────────────────────────────
# USERFILE SHARING (share.mod)
# Controls how the bot shares its user database with linked bots.
# Requires share.mod to be loaded and a botnet link established.
# ────────────────────────────────────────────────────────────────────────────

[share]
# Allow other bots to request a full userfile resync from this bot.
allow_resync = 0

# Seconds to wait before sending a requested resync (rate-limiting).
resync_time = 900

# Do not share global user flags with linked bots.
# When enabled, the bot keeps its own global flags and does not propagate them.
private_global = 0

# Do not share user records with linked bots at all.
private_user = 0

# Override local bot records with incoming ones from linked bots.
override_bots = 0

# Space-separated list of global flag letters to keep private (not shared).
# Example: "b n" keeps +b (bot) and +n (owner) flags local only.
# private_globals = ""

# Compress userfiles before sending to linked bots (requires compress.mod).
# share_compressed = 1

# ────────────────────────────────────────────────────────────────────────────
# FILE SERVER (filesys.mod)
# ────────────────────────────────────────────────────────────────────────────

[filesys]
# Root path of the file system visible to users.
files_path    = "/home/mydir/filesys"

# Incoming upload directory.
incoming_path = "/home/mydir/filesys/incoming"

# Upload files into the current directory instead of incoming_path.
upload_to_pwd = 0

# filedb_path = ""

# Maximum simultaneous file-area users.
max_file_users = 20

# Maximum size of a single uploadable file in kilobytes.
max_filesize = 1024

# ────────────────────────────────────────────────────────────────────────────
# NOTES MODULE (notes.mod)
# ────────────────────────────────────────────────────────────────────────────

[notes]
# Maximum stored notes per user.
max_notes = 50

# Note lifetime in days (0 = forever).
note_life = 60

# Allow note forwarding.
allow_fwd = 0

# Notify users of waiting notes.
notify_users = 0

# Notify on IRC join.
notify_onjoin = 1

# ────────────────────────────────────────────────────────────────────────────
# DNS MODULE (dns.mod)
# Eggdrop has a built-in async DNS resolver (dns.mod).  These settings tune
# its behaviour.  They have no effect if dns.mod is not loaded.
# ────────────────────────────────────────────────────────────────────────────

[dns]
# Maximum number of DNS queries to send per polling pass.
dns_maxsends = 4

# Seconds to wait before retrying a failed DNS query.
dns_retrydelay = 3

# Seconds to cache successful DNS results (default: 86400 = 24 h).
dns_cache = 86400

# Seconds to cache negative (NXDOMAIN) results (default: 600 = 10 min).
dns_negcache = 600

# Space-separated list of DNS server IPs to use instead of /etc/resolv.conf.
# Leave empty to use the system resolver.
# dns_servers = "1.1.1.1 8.8.8.8"

# ────────────────────────────────────────────────────────────────────────────
# CONSOLE MODULE (console.mod)
# ────────────────────────────────────────────────────────────────────────────

[console]
# Default console flags shown when a user connects to DCC.
# Must be named "console" to match the Tcl variable (not "console_flags").
console = "mkcoblxs"

# Auto-save console settings on change.
console_autosave = 1

# Force all DCC users into a channel view.
force_channel = 0

# Show info in the party-line.
info_party = 0

# ────────────────────────────────────────────────────────────────────────────
# PASSWORD / ENCRYPTION
# ────────────────────────────────────────────────────────────────────────────

[crypto]
# PBKDF2 hash method: SHA256 or SHA512.
# pbkdf2_method = "SHA256"

# PBKDF2 iteration count.
# pbkdf2_rounds = 16000

# Automatically re-encode legacy passwords to PBKDF2 when a user logs in.
# Set to 0 to keep passwords in their original format.
pbkdf2_re_encode = 1

# Blowfish encryption mode: cbc or ecb.
blowfish_use_mode = "cbc"

# Compression level for compress.mod userfile sharing (1=fast … 9=best, default 9).
# Only used when compress.mod is loaded and share_compressed = 1.
# compress_level = 9

# ────────────────────────────────────────────────────────────────────────────
# IDENT MODULE (ident.mod)
# ────────────────────────────────────────────────────────────────────────────

[ident]
# Ident method: 0 = built-in, 1 = system identd.
# ident_method = 0

# Port for the built-in ident server.
# ident_port = 113

# ────────────────────────────────────────────────────────────────────────────
# WEBUI MODULE (webui.mod)  — requires TLS
# Also uncomment "webui" in [modules].load above.
# ────────────────────────────────────────────────────────────────────────────

# [webui]
# To configure the WebUI listening port, add Tcl commands in [tcl]:
#   commands = ["listen 8080 webui", "listen +8443 webui"]

# ────────────────────────────────────────────────────────────────────────────
# TCL
# Two ways to embed Tcl in the config:
#
# 1. commands = [...]  — an array of individual Tcl statements, each executed
#    in order.  Useful for one-liners like unbind / listen / channel set.
#
# 2. code = """..."""  — a single triple-quoted multi-line Tcl script block,
#    executed as one unit after commands[].  Ideal for proc definitions,
#    bind chains, and any multi-statement logic.
#
# Both run after all settings are applied, so they can reference any variable
# or module that was loaded above.
# ────────────────────────────────────────────────────────────────────────────

[tcl]
commands = [
  # Disable the 'simul' partyline command (owners can simulate other users).
  # Remove this line only if you fully trust all your owners.
  "unbind dcc n simul *dcc:simul",

  # Uncomment to disable .tcl and .set DCC commands:
  # "unbind dcc n tcl *dcc:tcl",
  # "unbind dcc n set *dcc:set",

  # Uncomment to disable the 'ident' MSG command:
  # "unbind msg - ident *msg:ident",
  # Note: hello and addhost are controlled by allow_hello / allow_addhost above.

  # Open a DCC/telnet port.  Replace 3333 with your chosen port number.
  # The second argument is the listener type: all (anyone), bots (bots only),
  # users (non-bot users), or idx (multi-protocol; rarely needed).
  # Uncomment ONE of these:
  # "listen 3333 all",     # standard partyline port (owner login, DCC, telnet)
  # "listen +3333 all",    # same, but TLS-only (requires SSL configured above)

  # Override default channel flags for every newly-added channel.
  # Equivalent to the old "set default-chanset { ... }" Tcl block.
  # Uncomment and edit the flags you want to change.
  # """set default-chanset {
  #   -autoop         -autovoice
  #   -bitch          +cycle
  #   +dontkickops    +dynamicbans
  #   +dynamicexempts +dynamicinvites
  #   -enforcebans    +greet
  #   -inactive       -nodesynch
  #   -protectfriends +protectops
  #   -revenge        -revengebot
  #   -secret         -seen
  #   +shared         -statuslog
  #   +userbans       +userexempts
  #   +userinvites    -protecthalfops
  #   -autohalfop     -static
  # }""",
]

# Multi-line Tcl script block — evaluated after commands[] above.
# Uncomment and write any Tcl code here: proc definitions, bind calls, etc.
#
# code = """
# proc greet_join {nick host hand chan} {
#   putserv "PRIVMSG $chan :Welcome to $chan, $nick!"
# }
# bind join - * greet_join
# """

# ────────────────────────────────────────────────────────────────────────────
# TCL SCRIPTS
# Tcl script files to load. Paths are relative to the eggdrop install dir.
# ────────────────────────────────────────────────────────────────────────────

[scripts]
load = [
  "scripts/autoscripts.tcl",  # Autoscripts framework (see doc/AUTOSCRIPTS)
  "scripts/alltools.tcl",     # Useful utility functions
  "scripts/action.fix.tcl",   # Fix /me action display
  "scripts/dccwhois.tcl",     # Let users .whois themselves
  "scripts/userinfo.tcl",     # URL, email, ICQ info commands
  # "scripts/compat.tcl",     # Backwards-compat shims (may break newer scripts)
  # "scripts/myscript.tcl",   # Add your own scripts here
]

# ────────────────────────────────────────────────────────────────────────────
# HELP FILES
# ────────────────────────────────────────────────────────────────────────────

[help]
load = [
  "userinfo.help",
]
